<!DOCTYPE html>
<html>
<head>
    <title>Bulk STK Push</title>
</head>
<body>

<h2>Bulk STK Push (Kinaracloud)</h2>

<label>Phone Numbers (comma separated)</label><br>
<textarea id="numbers" style="width:100%;height:120px;"></textarea><br>

<label>Amount</label><br>
<input type="number" id="amount" style="width:100%;"><br>

<label>Description</label><br>
<input type="text" id="description" style="width:100%;"><br>

<button onclick="sendSTK()">Send STK Push</button>

<h3>Response</h3>
<pre id="output"></pre>

<script>
async function sendSTK() {
    const numbers = document.getElementById('numbers').value;
    const amount = document.getElementById('amount').value;
    const description = document.getElementById('description').value;

    const res = await fetch('/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ numbers, amount, description })
    });

    const data = await res.json();
    document.getElementById('output').textContent = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
